name: Develop Branch Preview Publish

# Mirrors the securevector-guardian-model flow: every push to develop publishes
# a timestamped dev build to Test PyPI under the SAME package name. Publishes
# via trusted publishing (OIDC) — no API token; the publisher must be
# registered on test.pypi.org scoped to exactly this repo + this workflow file.

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Test PyPI trusted publishing

jobs:
  test-publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.10"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel

    - name: Generate development version
      run: |
        # PEP 440 dev version: X.Y.Z.devYYYYMMDDHHMMSS — the .dev suffix marks
        # these as previews; same package name on Test PyPI as the real one.
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        BASE_VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        DEV_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
        echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV

        sed -i "s/^version = \".*\"/version = \"$DEV_VERSION\"/" pyproject.toml
        sed -i 's/^description = "/description = "[DEVELOPMENT BUILD] /' pyproject.toml

        echo "Publishing securevector-sdk-langchain==$DEV_VERSION (commit $(git rev-parse --short HEAD))"

    - name: Security scan before build
      run: |
        echo "Scanning for potential secrets before publishing..."
        if grep -r -i --exclude-dir=.git \
           -E "\b(password|secret|private.*key)\s*[:=]\s*['\"][^'\"]{10,}" src/; then
          echo "Potential secrets found in source code!"
          exit 1
        fi
        echo "Security scan passed"

    - name: Pre-build validation
      run: |
        python -m pip install langchain-core
        PYTHONPATH=src python3 -c "
        from securevector_sdk_langchain import install, SecureVectorCallbackHandler
        from securevector_sdk_langchain.tool_id import normalize_tool_id, RUNTIME_KIND
        assert RUNTIME_KIND == 'langchain'
        print('Adapter imports successfully')
        "

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to Test PyPI (trusted publishing)
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

    - name: Test install from Test PyPI
      run: |
        # Test PyPI's index can lag a freshly-uploaded version by a few minutes
        # — retry instead of failing on propagation lag. --extra-index-url lets
        # the real deps (securevector-ai-monitor, langchain-core) resolve from
        # the main index.
        for i in 1 2 3 4 5 6; do
          if pip install --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "securevector-sdk-langchain==$DEV_VERSION"; then
            break
          fi
          if [ "$i" = "6" ]; then
            echo "Version $DEV_VERSION still not installable after ~5 minutes"
            exit 1
          fi
          echo "Index not propagated yet (attempt $i), retrying in 50s..."
          sleep 50
        done
        python -c "
        from securevector_sdk_langchain import SecureVectorCallbackHandler
        print('Installed preview imports cleanly')
        "
